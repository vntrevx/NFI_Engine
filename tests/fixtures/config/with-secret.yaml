engine:
  environment: local
  live_trading: false
  live_trading_confirmed: false
exchange:
  name: simulator
  trading_mode: spot
  testnet: true
  api_key: fixture-key-value
  api_secret: fixture-secret-value
strategy:
  name: AdapterSmokeStrategy
  module: nfi_engine.strategy.demo:AdapterSmokeStrategy
database:
  url: sqlite+aiosqlite:///data/nfi_engine.sqlite3
risk:
  stake_usdt: "10"
  max_daily_loss_pct: "0.05"
  leverage: "1"
  max_leverage: "1"
  liquidation_buffer: "0.05"
  max_open_trades: "3"
  stoploss_pct: "0.10"
  minimal_roi: "0.03"
  cooldown_seconds: 0
  locked_pairs: ""
backtest:
  timerange: null
  starting_balance_usdt: "1000"
  stoploss_pct: "0.10"
  fee_rate: "0.001"
  slippage_rate: "0"
  max_open_trades: "3"
paper_run:
  enabled: true
  max_events: 100
api:
  host: 127.0.0.1
  port: 18080
  csrf_enabled: true
ui:
  enabled: true
  read_only: false
logging:
  level: INFO
  json_logs: false
