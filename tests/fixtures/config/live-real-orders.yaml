engine:
  environment: local
  live_trading: true
  live_trading_confirmed: true
exchange:
  name: bybit
  trading_mode: futures
  margin_mode: isolated
  testnet: false
  api_key: fake-live-api-key
  api_secret: fake-live-api-secret
strategy:
  name: AdapterSmokeStrategy
  module: nfi_engine.strategy.demo:AdapterSmokeStrategy
database:
  url: sqlite+aiosqlite:///data/nfi_engine.sqlite3
risk:
  stake_usdt: "10"
  max_daily_loss_pct: "0.05"
  leverage: "2"
  max_leverage: "3"
  liquidation_buffer: "0.05"
  max_open_trades: "3"
  stoploss_pct: "0.10"
  minimal_roi: "0.03"
  cooldown_seconds: 0
  locked_pairs: ""
paper_run:
  enabled: true
  max_events: 100
